[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools>=68", "wheel"]

[project]
authors = [{name = "Codex"}]
dependencies = ["lark-oapi>=1.5.3"]
description = "Lark listener validation plugin for Orcheo"
name = "orcheo-plugin-lark-listener"
requires-python = ">=3.12"
version = "0.1.0"

[project.entry-points."orcheo.plugins"]
lark_listener = "orcheo_plugin_lark_listener:plugin"

[tool.setuptools.package-data]
orcheo_plugin_lark_listener = ["orcheo_plugin.toml"]

[tool.setuptools.package-dir]
"" = "src"
